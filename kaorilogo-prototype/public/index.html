<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAORILOGO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF7F4;
      --panel: #FFFFFF;
      --border: #E8E0D8;
      --primary: #6B5744;
      --accent: #A8845C;
      --text: #3D2E24;
      --text-soft: #8A7268;
      --ai-bubble: #F5F0EB;
      --user-bubble: #6B5744;
      --score-bar: #C9A87C;
      --gold: #C8952A;
      --gold-bg: #FDF8EE;
      --gold-border: #E8C96A;
    }

    body {
      background: var(--bg);
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .header-brand { display: flex; flex-direction: column; }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--primary);
      cursor: pointer;
      text-transform: uppercase;
    }
    header h1:hover { opacity: 0.7; }
    header p { font-size: 11px; color: var(--text-soft); letter-spacing: 0.04em; margin-top: 2px; }
    .header-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      margin: 0 16px;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text-soft);
    }

    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── 左カラム: チャット ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
      overflow: hidden;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.ai   { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
    }
    .bubble.ai {
      background: var(--ai-bubble);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .bubble.user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .agent-badge {
      font-size: 10px;
      color: var(--text-soft);
      margin-bottom: 4px;
      padding-left: 2px;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      gap: 10px;
    }
    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }
    #user-input:focus { border-color: var(--accent); }
    #send-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    #send-btn:hover { background: var(--primary); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 右カラム ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow-y: auto;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      letter-spacing: 0.06em;
      padding: 16px 20px 8px;
      border-bottom: 1px solid var(--border);
    }

    /* プロファイル */
    .profile-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .profile-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .axis-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .axis-label { font-size: 11px; color: var(--text-soft); width: 52px; flex-shrink: 0; }
    .axis-bar-wrap { flex: 1; position: relative; height: 6px; background: var(--border); border-radius: 3px; }
    .axis-bar {
      position: absolute;
      top: 0; bottom: 0;
      background: var(--score-bar);
      border-radius: 3px;
      transition: left 0.4s, width 0.4s;
    }
    .axis-value { font-size: 11px; color: var(--text); width: 64px; flex-shrink: 0; text-align: right; }

    .axis-tag {
      display: inline-block;
      background: #F5EDE3;
      color: var(--accent);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .axis-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* おすすめ（右パネル） */
    .reco-section { padding: 14px 20px; }

    .reco-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      transition: border-color 0.2s;
    }
    .reco-card:hover { border-color: var(--accent); }
    .reco-card.rank-1 {
      background: var(--gold-bg);
      border: 1.5px solid var(--gold-border);
    }
    .reco-card.rank-1:hover { border-color: var(--gold); }

    .reco-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .reco-rank {
      width: 18px; height: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .reco-card.rank-1 .reco-rank { background: var(--gold); }
    .reco-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .reco-score-text { margin-left: auto; font-size: 11px; color: var(--accent); font-weight: 600; white-space: nowrap; }
    .reco-card.rank-1 .reco-score-text { color: var(--gold); }

    .reco-score-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 5px; }
    .reco-score-bar { height: 3px; background: var(--score-bar); border-radius: 2px; transition: width 0.5s; }
    .reco-card.rank-1 .reco-score-bar { background: var(--gold); }

    .reco-reason { font-size: 11px; color: var(--text-soft); line-height: 1.5; }
    .reco-link {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 1px 8px;
    }
    .reco-link:hover { background: var(--accent); color: #fff; }

    /* チャット内フィーチャードカード */
    .featured-card {
      margin: 4px 0 0 0;
      background: var(--gold-bg);
      border: 1.5px solid var(--gold-border);
      border-radius: 12px;
      padding: 14px 16px;
      max-width: 72%;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .featured-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .featured-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .featured-reason {
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .featured-btn {
      display: inline-block;
      padding: 7px 16px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .featured-btn:hover { background: var(--accent); }

    .empty-state {
      font-size: 12px;
      color: var(--text-soft);
      text-align: center;
      padding: 20px;
    }

    .thinking { opacity: 0.5; font-style: italic; font-size: 13px; }

    /* ── シーン選択カード ── */
    .scene-choices {
      padding: 10px 16px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .scene-choices.hidden { display: none; }
    .scene-btn {
      padding: 0;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--panel);
    }
    .scene-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(107, 87, 68, 0.12);
    }
    .scene-btn-img {
      width: 100%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background-size: cover;
      background-position: center;
    }
    .scene-btn-label {
      padding: 5px 6px 7px;
      font-size: 11px;
      color: var(--text);
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }
    /* シーン別カラー */
    .scene-btn[data-key="work"]    .scene-btn-img { background: linear-gradient(135deg, #FFF8EE 0%, #FFE8C8 100%); }
    .scene-btn[data-key="sleep"]   .scene-btn-img { background: linear-gradient(135deg, #E8E0F5 0%, #C5B8E8 100%); }
    .scene-btn[data-key="relax"]   .scene-btn-img { background: linear-gradient(135deg, #FFF3ED 0%, #FFD8B8 100%); }
    .scene-btn[data-key="outdoor"] .scene-btn-img { background: linear-gradient(135deg, #E8F5EE 0%, #B8E8D0 100%); }
    .scene-btn[data-key="gift"]    .scene-btn-img { background: linear-gradient(135deg, #FDE8F0 0%, #F5C0D8 100%); }

    /* ── チャット内フィーチャードカード（複数） ── */
    .featured-group {
      margin: 4px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 80%;
      animation: fadeInUp 0.4s ease;
    }
    .featured-group-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      letter-spacing: 0.04em;
      padding-left: 2px;
    }
    .featured-card {
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      transition: box-shadow 0.2s;
    }
    .featured-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
    .featured-card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .featured-card-emoji {
      font-size: 24px;
      flex-shrink: 0;
    }
    .featured-card-body { flex: 1; min-width: 0; }
    .featured-rank-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .featured-card:not(:first-child) .featured-rank-badge { color: var(--text-soft); }
    .featured-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .featured-reason {
      font-size: 11px;
      color: var(--text-soft);
      line-height: 1.5;
    }
    .featured-card-footer {
      padding: 8px 16px 12px;
    }
    .featured-btn {
      display: inline-block;
      padding: 6px 14px;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .featured-btn:hover { background: var(--accent); }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <h1>KAORILOGO</h1>
    <p>Life of Aroma</p>
  </div>
  <div class="header-divider"></div>
  <span class="header-sub">あなたにぴったりの香りを見つけよう</span>
</header>

<main>
  <!-- 左: チャット -->
  <div class="chat-panel">
    <div id="chat-messages"></div>
    <div class="scene-choices" id="scene-choices">
      <button class="scene-btn" data-key="work"    data-scene="仕事中・在宅ワーク中に使いたい">
        <div class="scene-btn-img">💼</div>
        <div class="scene-btn-label">仕事中・在宅</div>
      </button>
      <button class="scene-btn" data-key="sleep"   data-scene="寝る前、寝室で使いたい">
        <div class="scene-btn-img">🌙</div>
        <div class="scene-btn-label">寝る前・寝室</div>
      </button>
      <button class="scene-btn" data-key="relax"   data-scene="リビングでくつろぐときに使いたい">
        <div class="scene-btn-img">🛋️</div>
        <div class="scene-btn-label">リビングで<br>くつろぐ</div>
      </button>
      <button class="scene-btn" data-key="outdoor" data-scene="外出やお出かけのときに使いたい">
        <div class="scene-btn-img">🌿</div>
        <div class="scene-btn-label">外出・お出かけ</div>
      </button>
      <button class="scene-btn" data-key="gift"    data-scene="ギフト・プレゼント用に選びたい">
        <div class="scene-btn-img">🎁</div>
        <div class="scene-btn-label">ギフト・<br>プレゼント用</div>
      </button>
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="どんな気分ですか？どんな場面で使いたいですか？" />
      <button id="send-btn">送信</button>
    </div>
  </div>

  <!-- 右: プロファイル + おすすめ -->
  <div class="right-panel">
    <div class="section-title">🌸 あなたの香りのプロファイル</div>
    <div class="profile-section">
      <div id="profile-axes"></div>
      <div id="profile-tags" class="axis-tags"></div>
    </div>

    <div class="section-title">✨ おすすめの香り（全商品）</div>
    <div class="reco-section">
      <div id="reco-list"><div class="empty-state">会話を始めると<br>おすすめが表示されます</div></div>
    </div>
  </div>
</main>

<script>
  const chatEl      = document.getElementById('chat-messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const axesEl      = document.getElementById('profile-axes');
  const tagsEl      = document.getElementById('profile-tags');
  const recoEl      = document.getElementById('reco-list');
  const sceneChoices = document.getElementById('scene-choices');

  let history = [];
  let currentProfile = { activation: null, sensory: null, social: null, formality: null, scene: null, time: null };
  let prevAgent = 'hearing';

function initChat() {
    history = [];
    currentProfile = { activation: null, sensory: null, social: null, formality: null, scene: null, time: null };
    prevAgent = 'hearing';
    chatEl.innerHTML = '';
    axesEl.innerHTML = '';
    tagsEl.innerHTML = '';
    recoEl.innerHTML = '<div class="empty-state">会話を始めると<br>おすすめが表示されます</div>';
    sceneChoices.classList.remove('hidden');
    addBubble('ai', 'こんにちは！どんな場面で香りを使いたいですか？\nたとえば「仕事中」「寝る前」「外出のとき」など、ふとした気分でも大丈夫ですよ。', 'hearing');
  }

  // 初期化
  initChat();

  // ヘッダークリックでリセット
  document.querySelector('header h1').addEventListener('click', () => {
    if (history.length > 0 && !confirm('会話をリセットしますか？')) return;
    initChat();
  });

  // 軸ラベル定義
  const AXIS_DEF = {
    activation: { label: '気分',    min: '鎮静',   max: '活性' },
    sensory:    { label: '香りの系統', min: '甘め',   max: '爽やか' },
    social:     { label: '場',      min: 'みんなと', max: 'ひとりで' },
    formality:  { label: 'スタイル', min: 'フォーマル', max: 'カジュアル' },
  };

  function addBubble(role, text, agent) {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    if (role === 'ai') {
      const badge = document.createElement('div');
      badge.className = 'agent-badge';
      badge.textContent = agentLabel(agent);
      wrap.appendChild(badge);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function agentLabel(agent) {
    if (agent === 'proposal') return 'おすすめ中';
    if (agent === 'closing')  return 'ご購入について';
    return 'ヒアリング中';
  }

  function renderProfile(profile) {
    axesEl.innerHTML = '';
    const numericAxes = ['activation', 'sensory', 'social', 'formality'];
    numericAxes.forEach(key => {
      const val = profile[key];
      const def = AXIS_DEF[key];
      const item = document.createElement('div');
      item.className = 'axis-item';

      const label = document.createElement('div');
      label.className = 'axis-label';
      label.textContent = def.label;

      const barWrap = document.createElement('div');
      barWrap.className = 'axis-bar-wrap';

      if (val !== null) {
        const bar = document.createElement('div');
        bar.className = 'axis-bar';
        // -2〜+2 を 0〜100% にマッピング。中央(0)から伸びるバー
        const center = 50;
        const pct = (val / 2) * 40; // 最大±40%
        bar.style.left   = pct >= 0 ? `${center}%` : `${center + pct}%`;
        bar.style.width  = `${Math.abs(pct)}%`;
        barWrap.appendChild(bar);
      }

      const valueEl = document.createElement('div');
      valueEl.className = 'axis-value';
      if (val === null) {
        valueEl.textContent = '—';
        valueEl.style.color = '#ccc';
      } else {
        valueEl.textContent = val < 0 ? def.min : val > 0 ? def.max : '中間';
      }

      item.appendChild(label);
      item.appendChild(barWrap);
      item.appendChild(valueEl);
      axesEl.appendChild(item);
    });

    // scene / time はタグ表示
    tagsEl.innerHTML = '';
    ['scene', 'time'].forEach(key => {
      if (profile[key]) {
        const tag = document.createElement('span');
        tag.className = 'axis-tag';
        tag.textContent = key === 'scene' ? `📍 ${profile[key]}` : `🕐 ${profile[key]}`;
        tagsEl.appendChild(tag);
      }
    });
  }

  // 商品ごとのテーマ（背景グラデーション + 絵文字）
  const PRODUCT_THEMES = {
    'ON Time':          { from: '#FFF3E0', to: '#FFD8A0', emoji: '☀️' },
    'OFF Time':         { from: '#EDE7F6', to: '#C5B8E8', emoji: '🌙' },
    'All Time':         { from: '#F3E8FF', to: '#D8C8EE', emoji: '🌿' },
    '認知AM':            { from: '#E3F2FD', to: '#B0D8F5', emoji: '🧠' },
    '認知PM':            { from: '#E8EAF6', to: '#C0C8E8', emoji: '🌆' },
    'ラベンダー':         { from: '#F5EEF8', to: '#D8BCE8', emoji: '💜' },
    'ローズマリー':       { from: '#E8F5E9', to: '#A8D8B0', emoji: '🌱' },
    'レモン':            { from: '#FFFDE7', to: '#FFF088', emoji: '🍋' },
    'ベルガモット':       { from: '#FFF8E1', to: '#FFE090', emoji: '🍊' },
    'ペパーミント':       { from: '#E0F2F1', to: '#80D8CE', emoji: '❄️' },
    'ゼラニウム':         { from: '#FCE4EC', to: '#F4ADC4', emoji: '🌸' },
    'イランイラン':       { from: '#FFF9C4', to: '#F5E060', emoji: '✨' },
    '瀬戸の香':          { from: '#E0F7FA', to: '#80D8E8', emoji: '🌊' },
    '鶴香・未来':         { from: '#FAFAF0', to: '#E8E8C0', emoji: '🕊️' },
    'Upcycled Citron':  { from: '#F9FBE7', to: '#D8E890', emoji: '🌿' },
  };

  function getTheme(productName) {
    // 部分一致でもヒットするようにする
    for (const [key, theme] of Object.entries(PRODUCT_THEMES)) {
      if (productName.includes(key) || key.includes(productName)) return theme;
    }
    return { from: '#FAF7F4', to: '#EDE0D8', emoji: '🌸' };
  }

  function productSlug(name) {
    return name.replace(/\s+/g, '-').toLowerCase();
  }

  function renderRecommendations(list, agent) {
    if (!list || list.length === 0) return;
    recoEl.innerHTML = '';
    const showLinks = (agent === 'closing' || agent === 'proposal');
    list.forEach(r => {
      const card = document.createElement('div');
      card.className = `reco-card${r.rank === 1 ? ' rank-1' : ''}`;
      const slug = productSlug(r.product);
      const linkHtml = showLinks
        ? `<a class="reco-link" href="https://lifeofaroma.thebase.in/search?q=${encodeURIComponent(r.product)}" target="_blank">詳細・購入 →</a>`
        : '';
      card.innerHTML = `
        <div class="reco-header">
          <div class="reco-rank">${r.rank}</div>
          <div class="reco-name">${r.product}</div>
          <div class="reco-score-text">${r.match_score}%</div>
        </div>
        <div class="reco-score-bar-wrap"><div class="reco-score-bar" style="width:${r.match_score}%"></div></div>
        <div class="reco-reason">${r.reason}</div>
        ${linkHtml}
      `;
      recoEl.appendChild(card);
    });
  }

  function showFeaturedCards(list) {
    if (!list || list.length === 0) return;
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ai';

    const group = document.createElement('div');
    group.className = 'featured-group';

    const groupLabel = document.createElement('div');
    groupLabel.className = 'featured-group-label';
    groupLabel.textContent = `✨ あなたへのおすすめ ${list.length}選`;
    group.appendChild(groupLabel);

    list.forEach((rec, idx) => {
      const theme = getTheme(rec.product);
      const card = document.createElement('div');
      card.className = 'featured-card';
      card.style.background = `linear-gradient(135deg, ${theme.from} 0%, ${theme.to} 100%)`;
      card.style.borderColor = theme.to;
      card.innerHTML = `
        <div class="featured-card-header">
          <div class="featured-card-emoji">${theme.emoji}</div>
          <div class="featured-card-body">
            <div class="featured-rank-badge">${idx === 0 ? '★ いちばんおすすめ' : `No.${rec.rank}`}</div>
            <div class="featured-name">${rec.product}</div>
            <div class="featured-reason">${rec.reason}</div>
          </div>
        </div>
        <div class="featured-card-footer">
          <a class="featured-btn" href="https://lifeofaroma.thebase.in/search?q=${encodeURIComponent(rec.product)}" target="_blank">詳細・購入ページへ →</a>
        </div>
      `;
      group.appendChild(card);
    });

    wrap.appendChild(group);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    sceneChoices.classList.add('hidden');
    addBubble('user', text, null);

    // thinking表示
    const thinkingWrap = document.createElement('div');
    thinkingWrap.className = 'bubble-wrap ai';
    const thinkingBubble = document.createElement('div');
    thinkingBubble.className = 'bubble ai thinking';
    thinkingBubble.textContent = '考えています…';
    thinkingWrap.appendChild(thinkingBubble);
    chatEl.appendChild(thinkingWrap);
    chatEl.scrollTop = chatEl.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });
      const data = await res.json();

      chatEl.removeChild(thinkingWrap);

      if (data.error) {
        addBubble('ai', `エラーが発生しました: ${data.error}`, 'hearing');
      } else {
        addBubble('ai', data.reply, data.current_agent);

        // 会話履歴を更新
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: JSON.stringify(data) });

        // 右パネル更新
        if (data.profile) {
          currentProfile = data.profile;
          renderProfile(currentProfile);
        }
        if (data.recommendations && data.recommendations.length > 0) {
          renderRecommendations(data.recommendations, data.current_agent);

          // hearing → proposal 切り替え時にチャット内フィーチャードカードを表示（上位3件）
          if (prevAgent === 'hearing' && data.current_agent === 'proposal') {
            const top3 = data.recommendations
              .sort((a, b) => a.rank - b.rank)
              .slice(0, 3);
            if (top3.length > 0) showFeaturedCards(top3);
          }
        }
        prevAgent = data.current_agent;
      }
    } catch (err) {
      chatEl.removeChild(thinkingWrap);
      addBubble('ai', 'ネットワークエラーが発生しました。', 'hearing');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });

  // シーン選択ボタン
  sceneChoices.querySelectorAll('.scene-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const scene = btn.dataset.scene;
      inputEl.value = scene;
      sceneChoices.classList.add('hidden');
      sendMessage();
    });
  });

  // 初期プロファイル表示
  renderProfile(currentProfile);
</script>
</body>
</html>
