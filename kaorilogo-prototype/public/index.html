<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAORILOGO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF7F4;
      --panel: #FFFFFF;
      --border: #E8E0D8;
      --primary: #6B5744;
      --accent: #A8845C;
      --text: #3D2E24;
      --text-soft: #8A7268;
      --ai-bubble: #F5F0EB;
      --user-bubble: #6B5744;
      --score-bar: #C9A87C;
      --gold: #C8952A;
      --gold-bg: #FDF8EE;
      --gold-border: #E8C96A;
    }

    body {
      background: var(--bg);
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .header-brand { display: flex; flex-direction: column; }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--primary);
      cursor: pointer;
      text-transform: uppercase;
    }
    header h1:hover { opacity: 0.7; }
    header p { font-size: 11px; color: var(--text-soft); letter-spacing: 0.04em; margin-top: 2px; }
    .header-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      margin: 0 16px;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text-soft);
    }

    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── 左カラム: チャット ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
      overflow: hidden;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.user { justify-content: flex-end; }
    .bubble-wrap.ai   { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
    }
    .bubble.ai {
      background: var(--ai-bubble);
      border-bottom-left-radius: 4px;
      color: var(--text);
      white-space: pre-line;
    }
    .bubble.user {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .agent-badge {
      font-size: 10px;
      color: var(--text-soft);
      margin-bottom: 4px;
      padding-left: 2px;
    }
    .agent-badge-progress {
      font-size: 10px;
      color: var(--text-soft);
      padding-left: 2px;
      margin-top: -2px;
      margin-bottom: 4px;
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      gap: 10px;
    }
    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }
    #user-input:focus { border-color: var(--accent); }
    #send-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    #send-btn:hover { background: var(--primary); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 右カラム ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow-y: auto;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      letter-spacing: 0.06em;
      padding: 16px 20px 8px;
      border-bottom: 1px solid var(--border);
    }

    /* プロファイル */
    .profile-section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .profile-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .axis-item {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 12px;
    }
    .axis-title {
      font-size: 11px;
      color: var(--text-soft);
      white-space: nowrap;
      flex-shrink: 0;
      width: 44px;
    }
    .axis-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .axis-endpoints {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-soft);
      opacity: 0.75;
    }
    .axis-bar-wrap { position: relative; height: 6px; background: var(--border); border-radius: 3px; }
    .axis-bar {
      position: absolute;
      top: 0; bottom: 0;
      background: var(--score-bar);
      border-radius: 3px;
      transition: left 0.4s, width 0.4s;
    }

    .axis-tag {
      display: inline-block;
      background: #F5EDE3;
      color: var(--accent);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .axis-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .scene-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    .scene-value {
      font-size: 11px;
      color: var(--accent);
    }
    .scene-value.empty { color: var(--border); }

    /* おすすめカード内 商品軸ミニバー */
    .reco-axes { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
    .reco-axis-item { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
    .reco-axis-label { font-size: 9px; color: var(--text-soft); width: 36px; flex-shrink: 0; }
    .reco-axis-bar-wrap { flex: 1; position: relative; height: 3px; background: var(--border); border-radius: 2px; }
    .reco-axis-bar { position: absolute; top: 0; bottom: 0; background: var(--score-bar); border-radius: 2px; transition: left 0.3s, width 0.3s; }
    .reco-card.rank-1 .reco-axis-bar { background: var(--gold); }
    .reco-axis-scene { font-size: 9px; color: var(--text-soft); margin-top: 2px; }

    /* おすすめ（右パネル） */
    .reco-section { padding: 14px 20px; }

    .reco-card {
      display: block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      transition: border-color 0.2s;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .reco-card:hover { border-color: var(--accent); }
    .reco-card.rank-1 {
      background: var(--gold-bg);
      border: 1.5px solid var(--gold-border);
    }
    .reco-card.rank-1:hover { border-color: var(--gold); }

    .reco-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .reco-rank {
      width: 18px; height: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .reco-card.rank-1 .reco-rank { background: var(--gold); }
    .reco-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .reco-score-text { margin-left: auto; font-size: 11px; color: var(--accent); font-weight: 600; white-space: nowrap; }
    .reco-card.rank-1 .reco-score-text { color: var(--gold); }

    .reco-score-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 5px; }
    .reco-score-bar { height: 3px; background: var(--score-bar); border-radius: 2px; transition: width 0.5s; }
    .reco-card.rank-1 .reco-score-bar { background: var(--gold); }

    .reco-reason { font-size: 11px; color: var(--text-soft); line-height: 1.5; margin-bottom: 4px; }
    .reco-type-badge { font-size: 10px; color: var(--text-soft); background: var(--border); padding: 0 5px; border-radius: 4px; margin-left: 4px; flex-shrink: 0; }
    .reco-meta { font-size: 10px; color: var(--text-soft); margin-bottom: 3px; }
    .reco-meta-label { color: var(--text-soft); margin-right: 3px; }
    .reco-meta-ingredients { color: var(--text-soft); }
    .reco-meta-unverified { color: #e08c00; font-size: 9px; font-weight: 600; }

    /* チャット内フィーチャードカード */
    .featured-card {
      margin: 4px 0 0 0;
      background: var(--gold-bg);
      border: 1.5px solid var(--gold-border);
      border-radius: 12px;
      padding: 14px 16px;
      max-width: 72%;
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .featured-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .featured-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .featured-reason {
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .featured-btn {
      display: inline-block;
      padding: 7px 16px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .featured-btn:hover { background: var(--accent); }

    .empty-state {
      font-size: 12px;
      color: var(--text-soft);
      text-align: center;
      padding: 20px;
    }

    .thinking { opacity: 0.5; font-style: italic; font-size: 13px; }

    /* ── シーン選択カード（チャット内インライン） ── */
    .chat-scene-choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 80%;
      animation: fadeInUp 0.3s ease;
    }
    .scene-btn {
      padding: 0;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--panel);
    }
    .scene-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(107, 87, 68, 0.12);
    }
    .scene-btn-img {
      width: 100%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background-size: cover;
      background-position: center;
    }
    .scene-btn-label {
      padding: 5px 6px 7px;
      font-size: 11px;
      color: var(--text);
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }
    /* シーン別カラー */
    .scene-btn[data-key="work"]    .scene-btn-img { background: linear-gradient(135deg, #FFF8EE 0%, #FFE8C8 100%); }
    .scene-btn[data-key="sleep"]   .scene-btn-img { background: linear-gradient(135deg, #E8E0F5 0%, #C5B8E8 100%); }
    .scene-btn[data-key="relax"]   .scene-btn-img { background: linear-gradient(135deg, #FFF3ED 0%, #FFD8B8 100%); }
    .scene-btn[data-key="outdoor"] .scene-btn-img { background: linear-gradient(135deg, #E8F5EE 0%, #B8E8D0 100%); }
    .scene-btn[data-key="gift"]    .scene-btn-img { background: linear-gradient(135deg, #FDE8F0 0%, #F5C0D8 100%); }

    /* ── チャット内フィーチャードカード（複数） ── */
    .featured-group {
      margin: 4px 0 0 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 80%;
      animation: fadeInUp 0.4s ease;
    }
    .featured-group-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      letter-spacing: 0.04em;
      padding-left: 2px;
    }
    .featured-card {
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      transition: box-shadow 0.2s;
    }
    .featured-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
    .featured-card-header {
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .featured-card-emoji {
      font-size: 24px;
      flex-shrink: 0;
    }
    .featured-card-body { flex: 1; min-width: 0; }
    .featured-rank-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .featured-card:not(:first-child) .featured-rank-badge { color: var(--text-soft); }
    .featured-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .featured-reason {
      font-size: 11px;
      color: var(--text-soft);
      line-height: 1.5;
    }
    .featured-card-footer {
      padding: 8px 16px 12px;
    }
    .featured-btn {
      display: inline-block;
      padding: 6px 14px;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .featured-btn:hover { background: var(--accent); }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <h1>KAORILOGO</h1>
    <p>Life of Aroma</p>
  </div>
  <div class="header-divider"></div>
  <span class="header-sub">あなたにぴったりの香りを見つけよう</span>
</header>

<main>
  <!-- 左: チャット -->
  <div class="chat-panel">
    <div id="chat-messages"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="どんな気分ですか？どんな場面で使いたいですか？" />
      <button id="send-btn">送信</button>
    </div>
  </div>

  <!-- 右: プロファイル + おすすめ -->
  <div class="right-panel">
    <div class="section-title">🌸 あなたの香りのプロファイル</div>
    <div class="profile-section">
      <div id="profile-axes"></div>
      <div id="profile-tags" class="axis-tags"></div>
    </div>

    <div class="section-title">✨ おすすめの香り（上位5品）</div>
    <div class="reco-section">
      <div id="reco-list"><div class="empty-state">会話を始めると<br>おすすめが表示されます</div></div>
    </div>
  </div>
</main>

<script>
  const chatEl  = document.getElementById('chat-messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const axesEl = document.getElementById('profile-axes');
  const tagsEl = document.getElementById('profile-tags');
  const recoEl = document.getElementById('reco-list');

  let history = [];
  let currentProfile = { activation: null, sensory: null, social: null, formality: null, scene: null, time: null };
  let prevAgent = 'hearing';

  // 商品メタデータ（種別・成分）
  // ⚠️ 成分に【要確認】マークがついているものは暫定データです。
  //    ヒアリング時に香りロゴさんへ実際の配合を確認してください。
  const PRODUCT_META = {
    'ON Time':          { type: 'ブレンドオイル', ingredients: ['ローズマリー', 'レモン', 'スペアミント', 'ユーカリ'], verified: false },
    'OFF Time':         { type: 'ブレンドオイル', ingredients: ['ラベンダー', 'スイートオレンジ', 'グレープフルーツ', 'ホーリーフ'], verified: false },
    'All Time':         { type: 'ブレンドオイル', ingredients: ['マンダリン', 'スイートオレンジ', 'レモン', 'プチグレン'], verified: false },
    '認知AM':           { type: 'ブレンドオイル', ingredients: ['ローズマリー', 'レモン', 'スペアミント', 'ユーカリ'], verified: false },
    '認知PM':           { type: 'ブレンドオイル', ingredients: ['ラベンダー', 'ベルガモット', 'オレンジスイート'], verified: false },
    '瀬戸の香':         { type: 'ブレンドオイル', ingredients: ['広島産レモン', 'サイプレス', 'シダーウッド', 'ローズマリー'], verified: false },
    '鶴香・未来':       { type: 'ブレンドオイル', ingredients: ['レモン', 'ライム', 'グレープフルーツ'], verified: false },
    'Upcycled Citron':  { type: 'ブレンドオイル', ingredients: ['広島産レモン', 'ローズマリー', 'ティアレ', 'ムスク'], verified: false },
    'ラベンダー':       { type: 'エッセンシャルオイル', ingredients: [], verified: true },
    'ローズマリー':     { type: 'エッセンシャルオイル', ingredients: [], verified: true },
    'レモン':           { type: 'エッセンシャルオイル', ingredients: [], verified: true },
    'ベルガモット':     { type: 'エッセンシャルオイル', ingredients: [], verified: true },
    'ペパーミント':     { type: 'エッセンシャルオイル', ingredients: [], verified: true },
  };

  // シーン定義（画像生成後は key.png を参照）
  const SCENES = [
    { key: 'work',    scene: '仕事中・在宅ワーク中に使いたい',  label: '仕事中・在宅',       emoji: '💼' },
    { key: 'sleep',   scene: '寝る前、寝室で使いたい',          label: '寝る前・寝室',       emoji: '🌙' },
    { key: 'relax',   scene: 'リビングでくつろぐときに使いたい', label: 'リビングで\nくつろぐ', emoji: '🛋️' },
    { key: 'outdoor', scene: '外出やお出かけのときに使いたい',   label: '外出・お出かけ',     emoji: '🌿' },
    { key: 'gift',    scene: 'ギフト・プレゼント用に選びたい',  label: 'ギフト・\nプレゼント用', emoji: '🎁' },
  ];

  function addSceneCards() {
    const wrap = document.createElement('div');
    wrap.id = 'scene-cards-wrap';
    wrap.className = 'bubble-wrap ai';

    const grid = document.createElement('div');
    grid.className = 'chat-scene-choices';

    SCENES.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'scene-btn';
      btn.dataset.key = s.key;
      btn.dataset.scene = s.scene;

      // 生成済み画像があれば使う、なければ絵文字グラデーション
      const imgDiv = document.createElement('div');
      imgDiv.className = 'scene-btn-img';
      const img = document.createElement('img');
      img.src = `/images/scenes/${s.key}.png`;
      img.alt = s.label;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:0;';
      img.onerror = () => { img.remove(); imgDiv.textContent = s.emoji; };
      imgDiv.appendChild(img);

      const labelDiv = document.createElement('div');
      labelDiv.className = 'scene-btn-label';
      labelDiv.innerHTML = s.label.replace('\n', '<br>');

      btn.appendChild(imgDiv);
      btn.appendChild(labelDiv);

      btn.addEventListener('click', () => {
        removeSceneCards();
        inputEl.value = s.scene;
        sendMessage();
      });
      grid.appendChild(btn);
    });

    wrap.appendChild(grid);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeSceneCards() {
    const wrap = document.getElementById('scene-cards-wrap');
    if (wrap) wrap.remove();
  }

  function initChat() {
    history = [];
    currentProfile = { activation: null, sensory: null, social: null, formality: null, scene: null, time: null };
    prevAgent = 'hearing';
    chatEl.innerHTML = '';
    axesEl.innerHTML = '';
    tagsEl.innerHTML = '';
    recoEl.innerHTML = '<div class="empty-state">会話を始めると<br>おすすめが表示されます</div>';
    addBubble('ai', 'こんにちは！どんな場面で香りを使いたいですか？\nたとえば「仕事中」「寝る前」「外出のとき」など、ふとした気分でも大丈夫ですよ。', 'hearing');
    addSceneCards();
  }

  // 初期化
  initChat();

  // ヘッダークリックでリセット
  document.querySelector('header h1').addEventListener('click', () => {
    if (history.length > 0 && !confirm('会話をリセットしますか？')) return;
    initChat();
  });

  // 軸ラベル定義
  const AXIS_DEF = {
    activation: { label: '気分',     min: '鎮静',    max: '活性' },
    sensory:    { label: '香り系統',  min: '甘め',    max: '爽やか' },
    social:     { label: '場',       min: 'みんなと', max: 'ひとりで' },
    formality:  { label: 'スタイル', min: 'フォーマル', max: 'カジュアル' },
    time:       { label: '時間帯',   min: '朝・早朝', max: '夜・深夜' },
  };

  // time文字列を -2〜+2 に変換
  function timeToValue(t) {
    if (!t) return null;
    if (/早朝|明け方/.test(t)) return -2;
    if (/朝/.test(t))          return -1;
    if (/昼|午後|正午/.test(t)) return 0;
    if (/夕方|夕|夜前/.test(t)) return 1;
    if (/夜|深夜/.test(t))     return 2;
    return 0;
  }

  function addBubble(role, text, agent, filledAxes) {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    if (role === 'ai') {
      const badge = document.createElement('div');
      badge.className = 'agent-badge';
      badge.textContent = agentLabel(agent);
      wrap.appendChild(badge);
      if (agent === 'hearing' && filledAxes !== undefined) {
        const pct = document.createElement('div');
        pct.className = 'agent-badge-progress';
        pct.textContent = `${Math.round(filledAxes / 6 * 100)}%`;
        wrap.appendChild(pct);
      }
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function agentLabel(agent) {
    if (agent === 'proposal') return 'おすすめ中';
    if (agent === 'closing')  return 'ご購入について';
    return 'ヒアリング中';
  }

  // 商品ごとの6軸データ（暫定値、verified:false は要確認）
  const PRODUCT_AXES = {
    'ON Time':         { activation: +2, sensory:  0, social:  0, formality: +1, time: -1, scene: '仕事・在宅' },
    'OFF Time':        { activation: -2, sensory: -1, social: -1, formality: -1, time: +2, scene: '寝室・リビング' },
    'All Time':        { activation:  0, sensory:  0, social:  0, formality:  0, time:  0, scene: 'どこでも' },
    '認知AM':          { activation: +1, sensory:  0, social: +1, formality: +1, time: -1, scene: '仕事' },
    '認知PM':          { activation: -1, sensory:  0, social: -1, formality: +1, time: +2, scene: '仕事後' },
    'ラベンダー':      { activation: -2, sensory: -1, social: -1, formality: -1, time: +2, scene: '寝室' },
    'ローズマリー':    { activation: +2, sensory: +1, social: +1, formality: +1, time: -1, scene: '仕事・勉強' },
    'レモン':          { activation: +1, sensory: +2, social: +1, formality:  0, time:  0, scene: 'どこでも' },
    'ベルガモット':    { activation: -1, sensory: +1, social: -1, formality: -1, time: +1, scene: 'リビング' },
    'ペパーミント':    { activation: +2, sensory: +2, social: +1, formality: +1, time:  0, scene: '仕事・運動' },
    '瀬戸の香':        { activation: +1, sensory: +1, social: -1, formality: -1, time:  0, scene: 'リビング・外出' },
    '鶴香・未来':      { activation:  0, sensory: +1, social: +1, formality: +1, time:  0, scene: 'どこでも' },
    'Upcycled Citron': { activation: +1, sensory: +1, social: -1, formality: -1, time:  0, scene: 'リビング・外出' },
  };

  function renderAxisBar(key, val) {
    const def = AXIS_DEF[key];
    const item = document.createElement('div');
    item.className = 'axis-item';

    const titleEl = document.createElement('div');
    titleEl.className = 'axis-title';
    titleEl.textContent = def.label;

    const barCol = document.createElement('div');
    barCol.className = 'axis-bar-col';

    const endpoints = document.createElement('div');
    endpoints.className = 'axis-endpoints';
    const minEl = document.createElement('span');
    minEl.textContent = def.min;
    const maxEl = document.createElement('span');
    maxEl.textContent = def.max;
    endpoints.appendChild(minEl);
    endpoints.appendChild(maxEl);

    const barWrap = document.createElement('div');
    barWrap.className = 'axis-bar-wrap';

    if (val !== null) {
      const bar = document.createElement('div');
      bar.className = 'axis-bar';
      const center = 50;
      const pct = (val / 2) * 40;
      bar.style.left  = pct >= 0 ? `${center}%` : `${center + pct}%`;
      bar.style.width = `${Math.abs(pct)}%`;
      barWrap.appendChild(bar);
    }

    barCol.appendChild(endpoints);
    barCol.appendChild(barWrap);
    item.appendChild(titleEl);
    item.appendChild(barCol);
    return item;
  }

  function renderMiniAxes(productName) {
    const axes = PRODUCT_AXES[productName];
    if (!axes) return null;
    const wrap = document.createElement('div');
    wrap.className = 'reco-axes';
    const numericKeys = [
      { key: 'activation', label: '気分' },
      { key: 'sensory',    label: '香り' },
      { key: 'social',     label: '場' },
      { key: 'formality',  label: 'スタイル' },
      { key: 'time',       label: '時間帯' },
    ];
    numericKeys.forEach(({ key, label }) => {
      const val = axes[key];
      const row = document.createElement('div');
      row.className = 'reco-axis-item';
      const lbl = document.createElement('div');
      lbl.className = 'reco-axis-label';
      lbl.textContent = label;
      const barWrap = document.createElement('div');
      barWrap.className = 'reco-axis-bar-wrap';
      if (val !== null && val !== undefined) {
        const bar = document.createElement('div');
        bar.className = 'reco-axis-bar';
        const center = 50;
        const pct = (val / 2) * 40;
        bar.style.left  = pct >= 0 ? `${center}%` : `${center + pct}%`;
        bar.style.width = `${Math.abs(pct)}%`;
        barWrap.appendChild(bar);
      }
      row.appendChild(lbl);
      row.appendChild(barWrap);
      wrap.appendChild(row);
    });
    if (axes.scene) {
      const sceneEl = document.createElement('div');
      sceneEl.className = 'reco-axis-scene';
      sceneEl.textContent = `📍 ${axes.scene}`;
      wrap.appendChild(sceneEl);
    }
    return wrap;
  }

  function renderProfile(profile) {
    axesEl.innerHTML = '';
    ['activation', 'sensory', 'social', 'formality'].forEach(key => {
      axesEl.appendChild(renderAxisBar(key, profile[key]));
    });

    // time はバー表示
    const timeVal = timeToValue(profile.time);
    if (profile.time !== null) {
      axesEl.appendChild(renderAxisBar('time', timeVal));
    } else {
      axesEl.appendChild(renderAxisBar('time', null));
    }

    // scene はタイトル＋値を縦並びで表示
    tagsEl.innerHTML = '';
    const sceneItem = document.createElement('div');
    sceneItem.className = 'scene-item';
    const sceneLbl = document.createElement('div');
    sceneLbl.className = 'axis-title';
    sceneLbl.style.width = 'auto';
    sceneLbl.textContent = '使用シーン';
    const sceneVal = document.createElement('div');
    sceneVal.className = profile.scene ? 'scene-value' : 'scene-value empty';
    sceneVal.textContent = profile.scene ? `📍 ${profile.scene}` : '—';
    sceneItem.appendChild(sceneLbl);
    sceneItem.appendChild(sceneVal);
    tagsEl.appendChild(sceneItem);
  }

  // 商品ごとのテーマ（背景グラデーション + 絵文字）
  const PRODUCT_THEMES = {
    'ON Time':          { from: '#FFF3E0', to: '#FFD8A0', emoji: '☀️' },
    'OFF Time':         { from: '#EDE7F6', to: '#C5B8E8', emoji: '🌙' },
    'All Time':         { from: '#F3E8FF', to: '#D8C8EE', emoji: '🌿' },
    '認知AM':            { from: '#E3F2FD', to: '#B0D8F5', emoji: '🧠' },
    '認知PM':            { from: '#E8EAF6', to: '#C0C8E8', emoji: '🌆' },
    'ラベンダー':         { from: '#F5EEF8', to: '#D8BCE8', emoji: '💜' },
    'ローズマリー':       { from: '#E8F5E9', to: '#A8D8B0', emoji: '🌱' },
    'レモン':            { from: '#FFFDE7', to: '#FFF088', emoji: '🍋' },
    'ベルガモット':       { from: '#FFF8E1', to: '#FFE090', emoji: '🍊' },
    'ペパーミント':       { from: '#E0F2F1', to: '#80D8CE', emoji: '❄️' },
    'ゼラニウム':         { from: '#FCE4EC', to: '#F4ADC4', emoji: '🌸' },
    'イランイラン':       { from: '#FFF9C4', to: '#F5E060', emoji: '✨' },
    '瀬戸の香':          { from: '#E0F7FA', to: '#80D8E8', emoji: '🌊' },
    '鶴香・未来':         { from: '#FAFAF0', to: '#E8E8C0', emoji: '🕊️' },
    'Upcycled Citron':  { from: '#F9FBE7', to: '#D8E890', emoji: '🌿' },
  };

  function getTheme(productName) {
    // 部分一致でもヒットするようにする
    for (const [key, theme] of Object.entries(PRODUCT_THEMES)) {
      if (productName.includes(key) || key.includes(productName)) return theme;
    }
    return { from: '#FAF7F4', to: '#EDE0D8', emoji: '🌸' };
  }

  function productSlug(name) {
    return name.replace(/\s+/g, '-').toLowerCase();
  }

  function renderRecommendations(list, agent) {
    if (!list || list.length === 0) return;
    recoEl.innerHTML = '';
    list.forEach(r => {
      const card = document.createElement('a');
      card.className = `reco-card${r.rank === 1 ? ' rank-1' : ''}`;
      card.href = `https://lifeofaroma.thebase.in/search?q=${encodeURIComponent(r.product)}`;
      card.target = '_blank';
      const meta = PRODUCT_META[r.product];
      const typeBadge = meta ? `<span class="reco-type-badge">${meta.type}</span>` : '';
      let metaHtml = '';
      if (meta && meta.type === 'ブレンドオイル' && meta.ingredients.length > 0) {
        const unverifiedBadge = !meta.verified ? ' <span class="reco-meta-unverified">⚠️ 暫定</span>' : '';
        metaHtml = `<div class="reco-meta"><span class="reco-meta-label">(成分)</span><span class="reco-meta-ingredients">${meta.ingredients.join(' · ')}</span>${unverifiedBadge}</div>`;
      }
      card.innerHTML = `
        <div class="reco-header">
          <div class="reco-rank">${r.rank}</div>
          <div class="reco-name">${r.product}</div>
          ${typeBadge}
          <div class="reco-score-text">${r.match_score}%</div>
        </div>
        <div class="reco-score-bar-wrap"><div class="reco-score-bar" style="width:${r.match_score}%"></div></div>
        <div class="reco-reason">${r.reason}</div>
        ${metaHtml}
      `;
      const miniAxes = renderMiniAxes(r.product);
      if (miniAxes) card.appendChild(miniAxes);
      recoEl.appendChild(card);
    });
  }

  function showFeaturedCards(list) {
    if (!list || list.length === 0) return;
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ai';

    const group = document.createElement('div');
    group.className = 'featured-group';

    const groupLabel = document.createElement('div');
    groupLabel.className = 'featured-group-label';
    groupLabel.textContent = `✨ あなたへのおすすめ ${list.length}選`;
    group.appendChild(groupLabel);

    list.forEach((rec, idx) => {
      const theme = getTheme(rec.product);
      const card = document.createElement('div');
      card.className = 'featured-card';
      card.style.background = `linear-gradient(135deg, ${theme.from} 0%, ${theme.to} 100%)`;
      card.style.borderColor = theme.to;
      card.innerHTML = `
        <div class="featured-card-header">
          <div class="featured-card-emoji">${theme.emoji}</div>
          <div class="featured-card-body">
            <div class="featured-rank-badge">${idx === 0 ? '★ いちばんおすすめ' : `No.${rec.rank}`}</div>
            <div class="featured-name">${rec.product}</div>
            <div class="featured-reason">${rec.reason}</div>
          </div>
        </div>
        <div class="featured-card-footer">
          <a class="featured-btn" href="https://lifeofaroma.thebase.in/search?q=${encodeURIComponent(rec.product)}" target="_blank">詳細・購入ページへ →</a>
        </div>
      `;
      group.appendChild(card);
    });

    wrap.appendChild(group);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    removeSceneCards();
    addBubble('user', text, null);

    // thinking表示
    const thinkingWrap = document.createElement('div');
    thinkingWrap.className = 'bubble-wrap ai';
    const thinkingBubble = document.createElement('div');
    thinkingBubble.className = 'bubble ai thinking';
    thinkingBubble.textContent = '考えています…';
    thinkingWrap.appendChild(thinkingBubble);
    chatEl.appendChild(thinkingWrap);
    chatEl.scrollTop = chatEl.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let aiBubbleEl = null;
      let aiBadgeEl = null;
      let aiBubbleWrap = null;
      let streamedText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let chunk;
          try { chunk = JSON.parse(line.slice(6)); } catch { continue; }

          if (chunk.error) {
            chatEl.removeChild(thinkingWrap);
            addBubble('ai', `エラーが発生しました: ${chunk.error}`, 'hearing');
            break;
          }

          if (chunk.text !== undefined) {
            // 最初のテキストが来たらthinkingを消してバブル生成
            if (!aiBubbleEl) {
              chatEl.removeChild(thinkingWrap);
              aiBubbleWrap = document.createElement('div');
              aiBubbleWrap.className = 'bubble-wrap ai';
              aiBadgeEl = document.createElement('div');
              aiBadgeEl.className = 'agent-badge';
              aiBadgeEl.textContent = 'ヒアリング中';
              aiBubbleWrap.appendChild(aiBadgeEl);
              aiBubbleEl = document.createElement('div');
              aiBubbleEl.className = 'bubble ai';
              aiBubbleWrap.appendChild(aiBubbleEl);
              chatEl.appendChild(aiBubbleWrap);
            }
            streamedText += chunk.text;
            aiBubbleEl.textContent = streamedText.replace(/\\n/g, '\n');
            chatEl.scrollTop = chatEl.scrollHeight;
          }

          if (chunk.done) {
            const data = chunk;
            // バッジ・進捗を確定値で更新
            if (aiBadgeEl) aiBadgeEl.textContent = agentLabel(data.current_agent);
            if (data.current_agent === 'hearing' && typeof data.filled_axes === 'number') {
              const pct = document.createElement('div');
              pct.className = 'agent-badge-progress';
              pct.textContent = `${Math.round(data.filled_axes / 6 * 100)}%`;
              aiBubbleWrap.insertBefore(pct, aiBubbleEl);
            }
            if (aiBubbleEl) aiBubbleEl.textContent = data.reply || streamedText;

            history.push({ role: 'user', content: text });
            history.push({ role: 'assistant', content: JSON.stringify(data) });

            if (data.profile) { currentProfile = data.profile; renderProfile(currentProfile); }
            if (data.recommendations && data.recommendations.length > 0) {
              renderRecommendations(data.recommendations, data.current_agent);
              if (prevAgent === 'hearing' && data.current_agent === 'proposal') {
                const top3 = data.recommendations.sort((a, b) => a.rank - b.rank).slice(0, 3);
                if (top3.length > 0) showFeaturedCards(top3);
              }
            }
            prevAgent = data.current_agent;
          }
        }
      }
    } catch (err) {
      if (thinkingWrap.parentNode) chatEl.removeChild(thinkingWrap);
      addBubble('ai', 'ネットワークエラーが発生しました。', 'hearing');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });

  // 初期プロファイル表示
  renderProfile(currentProfile);
</script>
</body>
</html>
